name: Deploy Apps to Pages

on:
  push:
    branches:
      - master  # Der Workflow startet jedes Mal, wenn du in 'master' pushst

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install & Test & Build basics
        env:
          # Hier setzen wir die Variable nur für diesen Workflow
          DEPLOY_TARGET: gh-pages
        run: |
          cd apps/basics
          npm install
          npm run test
          npm run build

      - name: Install & Build chat-ui
        run: |
          cd apps/chat-ui
          npm install
          npm run generate

      - name: Deploy basics to GitHub Pages subpath
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: apps/basics/dist
          branch: gh-pages
          target-folder: basics
          clean: false

      - name: Deploy chat-ui to GitHub Pages subpath
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: apps/chat-ui/.output/public
          branch: gh-pages
          target-folder: chat-ui
          clean: false